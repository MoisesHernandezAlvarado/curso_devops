name: 🎟️ Boletera — Deploy a AWS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ================================
  # JOB 1: Tests
  # ================================
  test:
    name: ✅ Correr Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          pip install pytest psycopg2-binary

      - name: Correr tests
        run: PYTHONPATH=. pytest tests/ -v

  # ================================
  # JOB 2: Deploy (solo en main)
  # ================================
  deploy:
    name: 🚀 Deploy a AWS Lambda
    runs-on: ubuntu-latest
    needs: test  # Solo despliega si los tests pasan
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: SAM Build
        run: sam build

      - name: SAM Deploy
        run: |
          sam deploy \
            --stack-name lambda-curso-stack \
            --region us-east-1 \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              DBHost=${{ secrets.DB_HOST }} \
              DBName=${{ secrets.DB_NAME }} \
              DBUser=${{ secrets.DB_USER }} \
              DBPassword=${{ secrets.DB_PASSWORD }}

      - name: 🎉 Deploy exitoso
        run: echo "Lambda desplegada exitosamente en AWS!"
